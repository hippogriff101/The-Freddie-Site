<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Click anywhere to toggle.</title>
    <style>
    * {
      -webkit-font-smoothing: antialiased;
    }

    html {
      height: 100%;
      margin: 0;
    }

    body {
      position: relative;
      min-height: 100vh;
      margin: 0;
      background-color: var(--bg-color);
      overflow: hidden;
    }

    .toggle-fill {
      -webkit-appearance: none;
      position: fixed;
      inset: 0;
      margin: 0;
      padding: 0;
      outline: none;
      border: none;
      display: block;
      background-color: var(--bg-color);
      transition: background-color 1s;
      z-index: 0;
    }

    .toggle-fill:checked {
      transition: background-color 1s;
    }

    .button {
      position: fixed;
      right: 16px;
      bottom: 16px;
      background-color: black;
      color: white;
      border-radius: 10px;
      padding: 10px 20px;
      display: inline-block;
      border: none;
      cursor: pointer;
      z-index: 1;
    }
    </style>
  </head>
    
  <body>
  <input class="toggle-fill" type="checkbox" aria-label="Toggle background color">  
  <script src="fun.js"></script>
  <button class="button" onclick="location.href='../index.html'">Back to Main Page</button>
  </body>
  
</html>
